    /* =============================================
       LOOKUP + RELATED
    ============================================= */
    function getProductById(id) {
        for (var i = 0; i < PRODUCTS.length; i++) {
            if (PRODUCTS[i].id === id) return PRODUCTS[i];
        }
        return null;
    }

    function getRelated(product, count) {
        count = count || 4;
        var related = [];
        for (var i = 0; i < PRODUCTS.length; i++) {
            if (PRODUCTS[i].id !== product.id && PRODUCTS[i].category === product.category) {
                related.push(PRODUCTS[i]);
            }
            if (related.length >= count) break;
        }
        // Fill with other products if needed
        if (related.length < count) {
            for (var j = 0; j < PRODUCTS.length; j++) {
                if (PRODUCTS[j].id !== product.id && related.indexOf(PRODUCTS[j]) === -1) {
                    related.push(PRODUCTS[j]);
                }
                if (related.length >= count) break;
            }
        }
        return related;
    }

    /* =============================================
       RENDER RELATED PRODUCTS
    ============================================= */
    function renderRelated(product) {
        var related = getRelated(product, 4);
        var html = '';
        related.forEach(function (p) {
            var imgSrc = p.images[0];
            if (imgSrc.slice(-1) === '/') imgSrc = 'images/Products images/RetailHeroShots/RetailHero1.jpg';
            html += '<div class="col-lg-3 col-md-6 col-sm-6 m-b20">' +
                '<div class="related-product-card">' +
                '<a href="product-detail.html?product=' + p.id + '">' +
                '<img class="rpc-img" src="' + imgSrc + '" alt="' + p.name + '" onerror="this.src=\'images/Products images/RetailHeroShots/RetailHero1.jpg\'">' +
                '</a>' +
                '<div class="rpc-info">' +
                '<h5><a href="product-detail.html?product=' + p.id + '">' + p.name + '</a></h5>' +
                '<div class="rpc-price">$' + p.price.toFixed(2) + '</div>' +
                '<button class="site-button btn-sm btn-block" onclick="WuSpaCart.addToCart(\'' + p.id + '\',\'' + p.name.replace(/'/g,"\\'") + '\',' + p.price + ',\'' + imgSrc + '\');">' +
                '<i class="fa fa-cart-plus m-r5"></i>Add to Cart' +
                '</button>' +
                '</div>' +
                '</div>' +
                '</div>';
        });
        document.getElementById('related-products-grid').innerHTML = html;
    }

    /* =============================================
       SWITCH ACTIVE THUMBNAIL
    ============================================= */
    function switchDetailImage(el, src) {
        document.getElementById('detail-main-image').src = src;
        document.querySelectorAll('.product-thumb-strip img').forEach(function (img) {
            img.classList.remove('active');
        });
        el.classList.add('active');
    }

    /* =============================================
       ADD TO CART (respects qty)
    ============================================= */
    function handleAddToCart(id, name, price, image) {
        var qtyEl = document.getElementById('detail-qty');
        var qty = qtyEl ? Math.max(1, parseInt(qtyEl.value) || 1) : 1;
        WuSpaCart.addToCart(id, name, price, image, qty);
    }

    /* =============================================
       PAGE INIT — READ URL PARAM
    ============================================= */
    (function init() {
        var params = new URLSearchParams(window.location.search);
        var productId = params.get('product');
        var product = productId ? getProductById(productId) : null;

        if (!product) {
            // Show not-found message
            document.getElementById('product-detail-content').innerHTML =
                '<div class="not-found-box">' +
                '<i class="fa fa-exclamation-circle fa-3x m-b20" style="color:#EC5598;opacity:0.5;"></i>' +
                '<h3>Product Not Found</h3>' +
                '<p>The product you\'re looking for doesn\'t exist or may have been moved.</p>' +
                '<a href="product.html" class="site-button m-t15"><i class="fa fa-arrow-left m-r5"></i> Back to All Products</a>' +
                '</div>';
            document.getElementById('related-products-grid').innerHTML = '';
            return;
        }

        renderDetail(product);
        renderRelated(product);
    })();
