    <style>
        /* ---- Cart Page Styles ---- */
        .cart-table-wrap {
            border: 1px solid #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .cart-table thead {
            background: #EC5598;
            color: #fff;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .cart-table thead th {
            padding: 14px 16px;
            font-weight: 600;
            border: none;
        }
        .cart-table tbody tr {
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.15s;
        }
        .cart-table tbody tr:hover {
            background: #fdf7fa;
        }
        .cart-table tbody td {
            padding: 14px 16px;
            vertical-align: middle;
            font-size: 14px;
            color: #444;
            border: none;
        }
        .cart-item-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #eee;
        }
        .cart-item-name a {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .cart-item-name a:hover { color: #EC5598; }
        .cart-item-name small {
            display: block;
            color: #aaa;
            font-size: 12px;
            margin-top: 2px;
        }
        .cart-item-price { font-weight: 600; color: #555; }
        .cart-item-total { font-weight: 700; color: #EC5598; font-size: 15px; }
        .cart-qty-input {
            width: 65px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-size: 15px;
            padding: 0;
            color: #333;
        }
        .cart-remove-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            padding: 0 6px;
            transition: color 0.2s;
            line-height: 1;
        }
        .cart-remove-btn:hover { color: #EC5598; }

        /* Summary Box */
        .cart-summary-box {
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 4px;
            padding: 25px;
        }
        .cart-summary-box h4 {
            font-size: 18px;
            font-weight: 700;
            border-bottom: 2px solid #EC5598;
            padding-bottom: 12px;
            margin-bottom: 18px;
        }
        .cart-summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 10px;
            color: #555;
        }
        .cart-summary-row.total {
            font-size: 18px;
            font-weight: 700;
            color: #222;
            border-top: 1px solid #eee;
            padding-top: 12px;
            margin-top: 8px;
        }
        .cart-summary-row.total span:last-child { color: #EC5598; }
        .shipping-note {
            font-size: 12px;
            color: #888;
            margin-bottom: 18px;
            padding: 10px 14px;
            border-radius: 4px;
            background: #f9f9f9;
        }
        .shipping-note.free { background: #efffef; color: #2e7d32; font-weight: 600; }

        /* Empty cart */
        .empty-cart-box {
            text-align: center;
            padding: 80px 20px 60px;
        }
        .empty-cart-box .empty-cart-icon {
            font-size: 72px;
            color: #EC5598;
            opacity: 0.25;
            margin-bottom: 20px;
            display: block;
        }
        .empty-cart-box h3 { color: #555; margin-bottom: 10px; }
        .empty-cart-box p { color: #999; font-size: 15px; margin-bottom: 25px; }

        /* Responsive */
        .cart-table-col { display: table-cell; }
        @media (max-width: 767px) {
            .hide-mobile { display: none; }
            .cart-table thead th { font-size: 11px; padding: 10px 8px; }
            .cart-table tbody td { padding: 10px 8px; font-size: 13px; }
            .cart-item-img { width: 50px; height: 50px; }
        }
    </style>
</head>

            <!-- INNER PAGE BANNER -->

            <!-- BREADCRUMB ROW -->

                        <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
                        <li><a href="product.html">Products</a></li>

                    </ul>

            <!-- CART SECTION -->
            <div class="section-full p-t60 p-b60">

                    <!-- TITLE -->
                    <div class="p-b30 text-center">

                    <!-- CART CONTENT — filled by JS -->

    <!-- JAVASCRIPT FILES -->
    <script src="js/jquery-3.6.1.min.js"></script>

    <script src="js/imagesloaded.pkgd.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>

    <script src="js/shortcode.js"></script>

    <script>
    /* =============================================
       CART PAGE RENDERER
    ============================================= */
    var FREE_SHIPPING_THRESHOLD = 75;

    function renderCartPage() {
        var cart = WuSpaCart.getCart();
        var container = document.getElementById('cart-page-content');

        if (cart.length === 0) {
            container.innerHTML =
                '<div class="empty-cart-box">' +
                '<i class="fa fa-shopping-cart empty-cart-icon"></i>' +
                '<h3>Your Cart is Empty</h3>' +
                '<p>You haven\'t added any products to your cart yet.<br>Explore our professional Skin Script skincare range.</p>' +
                '<a href="product.html" class="site-button"><i class="fa fa-arrow-left m-r5"></i> Start Shopping</a>' +
                '</div>';
            return;
        }

        var subtotal = WuSpaCart.getTotal();
        var shippingNoteHTML;
        if (subtotal >= FREE_SHIPPING_THRESHOLD) {
            shippingNoteHTML = '<div class="shipping-note free"><i class="fa fa-check-circle m-r5"></i>Great news! You qualify for <strong>FREE shipping</strong>.</div>';
        } else {
            var remaining = (FREE_SHIPPING_THRESHOLD - subtotal).toFixed(2);
            shippingNoteHTML = '<div class="shipping-note"><i class="fa fa-truck m-r5"></i>Add <strong>$' + remaining + '</strong> more to get <strong>free shipping</strong>.</div>';
        }

        // Build rows
        var rowsHTML = '';
        cart.forEach(function (item) {
            var lineTotal = (item.price * item.qty).toFixed(2);
            rowsHTML +=
                '<tr id="cart-row-' + item.id + '">' +
                '<td><img src="' + item.image + '" class="cart-item-img" alt="' + item.name + '" onerror="this.src=\'images/Products images/RetailHeroShots/RetailHero1.jpg\'"></td>' +
                '<td class="cart-item-name">' +
                '<a href="product-detail.html?product=' + item.id + '">' + item.name + '</a>' +
                '<small>$' + item.price.toFixed(2) + ' each</small>' +
                '</td>' +
                '<td class="cart-item-price hide-mobile">$' + item.price.toFixed(2) + '</td>' +
                '<td>' +
                '<input type="number" class="cart-qty-input" value="' + item.qty + '" min="1" max="20" ' +
                'data-id="' + item.id + '" onchange="updateLineQty(this)">' +
                '</td>' +
                '<td class="cart-item-total">$' + lineTotal + '</td>' +
                '<td>' +
                '<button class="cart-remove-btn" onclick="removeCartLine(\'' + item.id + '\')" title="Remove item">' +
                '<i class="fa fa-times-circle"></i>' +
                '</button>' +
                '</td>' +
                '</tr>';
        });

        container.innerHTML =
            '<div class="row">' +

            // Left: table
            '<div class="col-lg-8 col-md-12 m-b30">' +
            '<div class="cart-table-wrap">' +
            '<table class="cart-table table" id="cart-table">' +
            '<thead>' +
            '<tr>' +
            '<th>Image</th>' +
            '<th>Product</th>' +
            '<th class="hide-mobile">Price</th>' +
            '<th>Qty</th>' +
            '<th>Total</th>' +
            '<th></th>' +
            '</tr>' +
            '</thead>' +
            '<tbody id="cart-table-body">' +
            rowsHTML +
            '</tbody>' +
            '</table>' +
            '</div>' +
            '<div class="cart-action-btns">' +
            '<a href="product.html" class="site-button-secondry m-r15"><i class="fa fa-arrow-left m-r5"></i>Continue Shopping</a>' +
            '</div>' +
            '</div>' +

            // Right: summary
            '<div class="col-lg-4 col-md-12">' +
            '<div class="cart-summary-box">' +
            '<h4>Order Summary</h4>' +
            shippingNoteHTML +
            '<div class="cart-summary-row"><span>Subtotal (<span id="summary-item-count">' + WuSpaCart.getTotalItems() + '</span> items)</span><span id="summary-subtotal">$' + subtotal.toFixed(2) + '</span></div>' +
            '<div class="cart-summary-row"><span>Shipping</span><span style="color:#' + (subtotal >= FREE_SHIPPING_THRESHOLD ? '2e7d32">FREE' : '999">Calculated at checkout') + '</span></div>' +
            '<div class="cart-summary-row total"><span>Estimated Total</span><span id="summary-total">$' + subtotal.toFixed(2) + '</span></div>' +
            '<a href="checkout.html" class="site-button btn-block m-t20" style="display:block;text-align:center;padding:14px;">' +
            '<i class="fa fa-lock m-r5"></i> Proceed to Checkout' +
            '</a>' +
            '<p style="font-size:11px;color:#aaa;text-align:center;margin-top:10px;">' +
            '<i class="fa fa-shield m-r3"></i> Secure checkout &nbsp;|&nbsp; <i class="fa fa-credit-card m-r3"></i> All major cards' +
            '</p>' +
            '</div>' +
            '</div>' +

            '</div>'; // end row
    }

    function updateLineQty(input) {
        var id = input.getAttribute('data-id');
        var qty = Math.max(1, parseInt(input.value) || 1);
        input.value = qty;
        WuSpaCart.updateQty(id, qty);
        // Update line total
        var cart = WuSpaCart.getCart();
        var item = null;
        for (var i = 0; i < cart.length; i++) {
            if (cart[i].id === id) { item = cart[i]; break; }
        }
        if (item) {
            var row = document.getElementById('cart-row-' + id);
            if (row) {
                var totalCell = row.querySelector('.cart-item-total');
                if (totalCell) totalCell.textContent = '$' + (item.price * qty).toFixed(2);
            }
        }
        // Recalculate summary
        refreshSummary();
    }

    function removeCartLine(id) {
        WuSpaCart.removeFromCart(id);
        var row = document.getElementById('cart-row-' + id);
        if (row) {
            row.style.transition = 'opacity 0.3s';
            row.style.opacity = '0';
            setTimeout(function () { renderCartPage(); }, 310);
        }
    }

    function refreshSummary() {
        var subtotal = WuSpaCart.getTotal();
        var count = WuSpaCart.getTotalItems();
        var subtotalEl = document.getElementById('summary-subtotal');
        var totalEl = document.getElementById('summary-total');
        var countEl = document.getElementById('summary-item-count');
        if (subtotalEl) subtotalEl.textContent = '$' + subtotal.toFixed(2);
        if (totalEl) totalEl.textContent = '$' + subtotal.toFixed(2);
        if (countEl) countEl.textContent = count;
    }

    // Render on load
    document.addEventListener('DOMContentLoaded', function () {
        renderCartPage();
    });
    </script>

</body>
